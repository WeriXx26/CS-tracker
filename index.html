<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CS2 TRACKER PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="smartphone-container">
    <header class="app-header">
        <div class="brand-center"><h1>CS2 TRACKER</h1></div>
        
        <nav class="main-nav">
            <div onclick="navigateTo('matches')" id="nav-matches" class="nav-link active">MATCHS</div>
            <div onclick="navigateTo('news')" id="nav-news" class="nav-link">ACTUS</div>
        </nav>
        
        <div class="tabs-container" id="sub-tabs">
            <div class="tab active" onclick="filterMatches('TOUS', this)">TOUS</div>
            <div class="tab" onclick="filterMatches('EQUIPES', this)">ÉQUIPES</div>
            <div class="tab" onclick="filterMatches('JOUEURS', this)">JOUEURS</div>
            <div class="tab" onclick="filterMatches('FAVORIS', this)">FAVORIS</div>
        </div>

        <div id="search-wrapper" class="search-bar-container">
            <input type="text" id="global-search" placeholder="Chercher équipe, tournoi ou joueur..." oninput="handleSearch()">
        </div>
    </header>

    <main id="match-list" class="content-area"></main>
    <div id="match-detail" class="detail-overlay"></div>
</div>

<script src="script.js"></script>
</body>
</html>
